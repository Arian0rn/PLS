name: Upload Large Video from Drive

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python (for gdown)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install downloader
        run: |
          pip install gdown

      - name: Download file from Google Drive
        run: |
          gdown 194vwHB6H8Qf2BE1ZyBdNrr335HImvFc0 -O video.mp4

      - name: Verify download
        run: |
          ls -lh video.mp4
          file video.mp4

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Commit file
        run: |
          git add video.mp4
          git commit -m "add large video" || echo "no changes"

      - name: Push to GitHub
        run: |
          git push origin HEAD:${{ github.ref_name }}
