name: Diagnose Drive

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: |
          pip install gdown

      - name: Test download verbose
        run: |
          gdown --verbose --fuzzy 194vwHB6H8Qf2BE1ZyBdNrr335HImvFc0 -O video.mp4
