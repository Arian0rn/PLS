name: FULL DEBUG

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check python
        run: |
          python --version
          pip --version

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: |
          pip install -v gdown

      - name: Run gdown debug
        run: |
          gdown --debug 194vwHB6H8Qf2BE1ZyBdNrr335HImvFc0
