name: Debug Drive Download

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: |
          pip install gdown

      - name: Download
        run: |
          gdown --fuzzy 194vwHB6H8Qf2BE1ZyBdNrr335HImvFc0 -O video.mp4

      - name: Verify
        run: |
          ls -lh
          file video.mp4 || true
