name: Debug Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdown
        run: |
          pip install gdown

      - name: Download (DEBUG MODE)
        run: |
          gdown --verbose 194vwHB6H8Qf2BE1ZyBdNrr335HImvFc0 -O video.mp4

      - name: Check file
        run: |
          ls -lh
          file video.mp4
