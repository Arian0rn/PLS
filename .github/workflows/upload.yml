name: Upload 1GB File

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git LFS
        run: |
          git lfs install

      - name: Download file
        run: |
          curl -L -o file.bin "https://drive.usercontent.google.com/download?id=194vwHB6H8Qf2BE1ZyBdNrr335HImvFc0&export=download&confirm=t"

      - name: Track LFS
        run: |
          git lfs track "file.bin"
          git add .gitattributes

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add file.bin
          git commit -m "upload large file" || echo "no changes"

      - name: Push
        run: |
          git push origin HEAD:${{ github.ref_name }}
