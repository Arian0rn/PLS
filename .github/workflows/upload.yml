name: Telegram File Upload

on:
  repository_dispatch:
    types: [upload-file]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download file
        run: |
          curl -L "${{ github.event.client_payload.url }}" -o file.mp4

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add file.mp4
          git commit -m "upload file" || echo "no changes"
          git push
